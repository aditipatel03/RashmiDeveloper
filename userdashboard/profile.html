<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Rashmi Land Developers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* Dashboard Specific Styles */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--primary-color);
            color: var(--white);
            padding: 30px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-header {
            margin-bottom: 50px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 15px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            transition: var(--transition-smooth);
            font-weight: 500;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(212, 175, 135, 0.15);
            color: var(--accent-color);
        }

        .sidebar-menu i {
            font-size: 1.2rem;
        }

        .dashboard-main {
            padding: 40px;
            background: #f8f9fa;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .profile-container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-premium);
            max-width: 800px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 992px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html">
                    <span class="text-gold premium-font" style="font-size: 1.5rem;">Rashmi</span>
                    <span class="text-gold premium-font" style="font-size: 1.5rem;"> Land Developers</span>
                </a>
            </div>

            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="ri-dashboard-line"></i> Dashboard</a></li>
                <li><a href="wishlist.html"><i class="ri-heart-line"></i> My Wishlist</a></li>
                <li><a href="appointments.html"><i class="ri-calendar-event-line"></i> Appointments</a></li>
                <li><a href="profile.html" class="active"><i class="ri-user-settings-line"></i> Profile</a></li>
                <li style="margin-top: 50px;"><a href="../index.html"><i class="ri-logout-box-line"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div>
                    <h2 class="premium-font">My <span class="text-gold">Profile</span></h2>
                    <p>Manage your account settings and preferences.</p>
                </div>
                <div class="user-profile">
                    <div class="user-avatar" id="dash-avatar">U</div>
                    <div>
                        <h4 style="font-size: 1rem;" id="dash-full-name">User</h4>
                        <p style="font-size: 0.8rem; color: var(--text-secondary);" id="dash-role">User</p>
                    </div>
                </div>
            </header>

            <div class="profile-container">
                <form id="profile-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="prof-name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="prof-email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="prof-phone" placeholder="Enter 10-digit phone number" maxlength="10"
                                pattern="[0-9]{10}" title="Please enter a 10-digit phone number">
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="prof-city" placeholder="Enter your city">
                        </div>
                        <div class="form-group">
                            <label>New Password (Optional)</label>
                            <input type="password" id="prof-password" placeholder="Enter new password to change">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="prof-confirm-password" placeholder="Confirm new password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 20px;" id="save-profile-btn">
                        Save Changes
                    </button>
                    <div id="profile-msg" style="margin-top: 15px; font-size: 0.9rem;"></div>
                </form>
            </div>

        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.api.getUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            const displayName = user.username || user.email?.split('@')[0] || 'User';

            // Update Profile Side Info
            const dashFullName = document.getElementById('dash-full-name');
            const dashAvatar = document.getElementById('dash-avatar');
            const dashRole = document.getElementById('dash-role');

            if (dashFullName) dashFullName.textContent = displayName;
            if (dashAvatar) dashAvatar.textContent = displayName.substring(0, 2).toUpperCase();
            if (dashRole) dashRole.textContent = user.role === 'admin' ? 'Administrator' : 'Verified User';

            // Fill Form Fields
            const profName = document.getElementById('prof-name');
            const profEmail = document.getElementById('prof-email');
            const profPhone = document.getElementById('prof-phone');

            if (profName) profName.value = displayName;
            if (profEmail) profEmail.value = user.email || '';
            if (profPhone) profPhone.value = user.phone || '';

            // Handle Form Submission
            const profileForm = document.getElementById('profile-form');
            const profileMsg = document.getElementById('profile-msg');
            const saveBtn = document.getElementById('save-profile-btn');

            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const password = document.getElementById('prof-password').value;
                const confirmPassword = document.getElementById('prof-confirm-password').value;

                if (password && password !== confirmPassword) {
                    profileMsg.textContent = 'Passwords do not match!';
                    profileMsg.style.color = 'red';
                    return;
                }

                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';
                profileMsg.textContent = '';

                try {
                    const updateData = {
                        username: profName.value,
                        email: profEmail.value,
                        phone: profPhone.value
                    };
                    if (password) updateData.password = password;

                    const result = await window.api.updateProfile(updateData);

                    profileMsg.textContent = result.msg;
                    profileMsg.style.color = 'var(--success)';

                    // Update header if name changed
                    if (window.parent && window.parent.updateHeader) {
                        window.parent.updateHeader();
                    }

                    // Reload to reflect changes if needed, or just update UI
                    setTimeout(() => {
                        location.reload();
                    }, 1500);

                } catch (err) {
                    profileMsg.textContent = err.message;
                    profileMsg.style.color = 'red';
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Changes';
                }
            });
        });
    </script>
</body>

</html>
