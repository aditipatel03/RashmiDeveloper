<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Rashmi Land Developers</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="auth-page">
        <div class="auth-container">
            <!-- Left Side Image -->
            <div class="auth-image"
                style="background-image: url('https://images.unsplash.com/photo-1543269664-76bc3997d9ea?ixlib=rb-4.0.3&w=1000&q=80');">
                <div class="auth-image-content">
                    <h2>Secure Your Account</h2>
                    <p>Enter your new password below.</p>
                </div>
            </div>

            <!-- Right Side Form -->
            <div class="auth-form-container">
                <div class="auth-header">
                    <div class="logo">
                        <a href="index.html">
                            <span class="text-gold premium-font" style="font-size: 1.5rem;">Rashmi</span><span
                                class="text-gold premium-font" style="font-size: 1.5rem;"> Land Developers</span>
                        </a>
                    </div>
                    <h3>Set New Password</h3>
                    <p>Please use a strong password</p>
                </div>

                <form class="auth-form" id="resetForm">
                    <div class="input-group">
                        <i class="ri-lock-2-line"></i>
                        <input type="password" placeholder="New Password" required minlength="6">
                    </div>
                    <div class="input-group">
                        <i class="ri-lock-password-line"></i>
                        <input type="password" placeholder="Confirm Password" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-premium-cta"
                        style="width: 100%; justify-content: center; margin-top: 10px;">
                        Reset Password
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Back to <a href="login.html">Log In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
